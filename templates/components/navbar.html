{% load static %}
<nav class="bg-white border-b border-gray-200" role="navigation" aria-label="Main navigation">
  <div class="max-w-7xl mx-auto px-4 lg:px-8 flex justify-between items-center h-16">

    <!-- Logo -->
    <a href="/" class="flex items-center gap-2">
      <img src="{% static 'images/dianec-gray.png' %}" alt="Diane Corriette logo" width="40" height="40" loading="lazy" class="h-10 w-10 object-contain">
      <span class="hidden sm:inline-block text-[color:var(--color-font-main)] font-semibold tracking-wide uppercase">Diane Corriette</span>
    </a>

    <!-- Desktop Navigation -->
    <div class="hidden sm:flex items-center gap-6 text-sm font-medium">
      <a href="{% url 'blog:list' %}" class="text-[color:var(--color-font-main)] hover:text-[color:var(--color-brand-primary)] transition">Blog</a>
      <a href="{% url 'portfolio:list' %}" class="text-[color:var(--color-font-main)] hover:text-[color:var(--color-brand-primary)] transition">Portfolio</a>
      <a href="{% url 'core:diane-corriette' %}" class="px-4 py-2 bg-[color:var(--color-brand-primary)] text-[color:var(--color-brand-primary-contrast)] rounded-lg hover:bg-[color:var(--color-brand-accent)] transition font-semibold">About</a>
    </div>

    <!-- Mobile: Hamburger -->
    <div class="flex sm:hidden items-center">
      <button id="menu-toggle" aria-label="Toggle menu" aria-expanded="false" aria-controls="mobile-menu"
              class="flex flex-col justify-center items-center w-8 h-8 gap-1.5 focus:outline-none">
        <span class="block h-0.5 w-6 bg-[color:var(--color-font-main)] rounded transition-all"></span>
        <span class="block h-0.5 w-6 bg-[color:var(--color-font-main)] rounded transition-all"></span>
        <span class="block h-0.5 w-6 bg-[color:var(--color-font-main)] rounded transition-all"></span>
      </button>
    </div>
  </div>

  <!-- Mobile Menu -->
  <div id="mobile-menu" class="hidden sm:hidden bg-white border-t border-gray-200">
    <div class="px-4 py-4 space-y-1">
      <a href="/" class="block py-3 text-[color:var(--color-font-main)] font-medium border-b border-gray-100">Home</a>
      <a href="{% url 'blog:list' %}" class="block py-3 text-[color:var(--color-font-main)] font-medium border-b border-gray-100">Blog</a>
      <a href="{% url 'portfolio:list' %}" class="block py-3 text-[color:var(--color-font-main)] font-medium border-b border-gray-100">Portfolio</a>
      <a href="{% url 'core:diane-corriette' %}" class="block py-3 text-[color:var(--color-brand-primary)] font-semibold">About</a>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const toggle = document.getElementById("menu-toggle");
      const menu = document.getElementById("mobile-menu");
      if (toggle && menu) {
        toggle.addEventListener("click", () => {
          menu.classList.toggle("hidden");
          const expanded = toggle.getAttribute("aria-expanded") === "true";
          toggle.setAttribute("aria-expanded", !expanded);
        });
        menu.querySelectorAll("a").forEach(link => {
          link.addEventListener("click", () => {
            menu.classList.add("hidden");
            toggle.setAttribute("aria-expanded", "false");
          });
        });
      }
    });
  </script>
</nav>
